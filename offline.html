<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Rolling Monitors</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .offline-container {
            text-align: center;
            background: rgba(30, 58, 138, 0.4);
            border: 2px solid #06b6d4;
            border-radius: 12px;
            padding: 40px 20px;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .offline-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #06b6d4;
        }

        p {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        a, button {
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        a.primary, button.primary {
            background: #3b82f6;
            color: white;
        }

        a.primary:hover, button.primary:hover {
            background: #2563eb;
        }

        a.secondary {
            background: #475569;
            color: white;
        }

        a.secondary:hover {
            background: #334155;
        }

        .status {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(6, 182, 212, 0.3);
            font-size: 12px;
            color: #64748b;
        }

        .spinner {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-right: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>The Rolling Monitors app requires internet to load, but it works offline once cached.</p>
        
        <div class="links">
            <button class="primary" onclick="window.location.href='./parametric.html'">Try Parametric Monitor</button>
            <button class="primary" onclick="window.location.href='./synchronous.html'">Try Synchronous Monitor</button>
            <a href="javascript:location.reload()" class="secondary">Retry Connection</a>
        </div>

        <div class="status">
            <div style="margin-bottom: 8px;">
                <span class="spinner"></span>Waiting for connection...
            </div>
            <div>Once cached, app works fully offline</div>
        </div>
    </div>

    <script>
        // Monitor connection status
        window.addEventListener('online', () => {
            console.log('Connection restored');
            document.body.style.opacity = '0.5';
            setTimeout(() => location.reload(), 1000);
        });

        // Try to reconnect periodically
        setInterval(() => {
            fetch('./', { method: 'HEAD', cache: 'no-store' })
                .then(() => {
                    // Connection restored
                    document.querySelector('.spinner').style.display = 'none';
                    document.querySelector('.status div:first-child').textContent = '✓ Connection restored!';
                    setTimeout(() => location.reload(), 1000);
                })
                .catch(() => {
                    // Still offline
                });
        }, 5000);
    </script>
</body>
</html>
