<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rolling Config">
    <link rel="manifest" href="./manifest.json">
    <title>Rolling Monitor - Configuration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .navbar {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            border-bottom: 2px solid #3b82f6;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            margin: -20px -16px 0 -16px;
            padding: 12px 16px;
        }

        .nav-btn {
            padding: 8px 14px;
            border: 1px solid #3b82f6;
            background: transparent;
            color: #93c5fd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-btn.active {
            background: #3b82f6;
            color: #fff;
            border-color: #1d4ed8;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-top: 20px;
        }

        .header {
            margin-bottom: 24px;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 12px;
        }

        .header h1 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #94a3b8;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 12px;
            color: #cbd5e1;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            background: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #60a5fa;
            background: #0f172a;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            grid-column: 1 / -1;
            margin-top: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            color: #e2e8f0;
            cursor: pointer;
            flex: 1;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            margin-bottom: 32px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save {
            background: #3b82f6;
            color: white;
            border: 2px solid #3b82f6;
        }

        .btn-save:active {
            background: #1d4ed8;
            transform: scale(0.95);
        }

        .btn-load {
            background: transparent;
            color: #60a5fa;
            border: 2px solid #3b82f6;
        }

        .btn-load:active {
            background: rgba(59, 130, 246, 0.1);
            transform: scale(0.95);
        }

        .status-message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }

        .status-message.success {
            background: rgba(16, 185, 129, 0.15);
            color: #86efac;
            border: 1px solid #10b981;
            display: block;
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid #ef4444;
            display: block;
        }

        .preset-section {
            background: #1e293b;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 14px;
            margin-top: 20px;
        }

        .preset-section h3 {
            font-size: 14px;
            color: #93c5fd;
            margin-bottom: 10px;
        }

        .preset-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .preset-btn {
            padding: 8px;
            background: #0f172a;
            border: 1px solid #3b82f6;
            color: #93c5fd;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:active {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <button class="nav-btn" onclick="goToPage('index.html')">Home</button>
        <button class="nav-btn" onclick="goToPage('parametric.html')">Parametric</button>
        <button class="nav-btn" onclick="goToPage('synchronous.html')">Synchronous</button>
        <button class="nav-btn" onclick="goToPage('rolling-wind.html')">Wind</button>
        <button class="nav-btn" onclick="goToPage('rolling-pitch.html')">UKC Pitch</button>
        <button class="nav-btn" onclick="goToPage('rolling-roll.html')">UKC Roll</button>
        <button class="nav-btn active" onclick="goToPage('rolling-config.html')">Config</button>
    </div>

    <div class="container">
        <div class="header">
            <h1>Vessel Configuration</h1>
            <p>Set up your vessel parameters for accurate calculations</p>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <form id="configForm">
            <!-- Vessel Identity -->
            <div class="form-grid">
                <div class="form-group full">
                    <label>Vessel Name</label>
                    <input type="text" id="vesselName" placeholder="e.g., Explorer of the Seas" value="Explorer of the Seas">
                </div>
            </div>

            <!-- Dimensions -->
            <div class="form-grid">
                <div class="form-group">
                    <label>Length Between Perpendiculars (m)</label>
                    <input type="number" id="lbp" step="0.1" placeholder="274" value="274">
                </div>
                <div class="form-group">
                    <label>Beam (m)</label>
                    <input type="number" id="beam" step="0.1" placeholder="38.6" value="38.6">
                </div>
                <div class="form-group">
                    <label>Draft (m)</label>
                    <input type="number" id="draft" step="0.1" placeholder="8.9" value="8.9">
                </div>
                <div class="form-group">
                    <label>Block Coefficient</label>
                    <input type="number" id="cb" step="0.001" placeholder="0.673" value="0.6732">
                </div>
                <div class="form-group">
                    <label>DWT Tonnage</label>
                    <input type="number" id="dwtTonnage" step="100" placeholder="182000" value="182000">
                </div>
                <div class="form-group">
                    <label>Water Depth (m)</label>
                    <input type="number" id="waterDepth" step="0.5" placeholder="17" value="17">
                </div>
            </div>

            <!-- Wind Parameters -->
            <div class="form-grid">
                <div class="form-group">
                    <label>Mast Height (m)</label>
                    <input type="number" id="mastHeight" step="0.1" placeholder="32.9" value="32.9">
                </div>
                <div class="form-group">
                    <label>Projected Area (m²)</label>
                    <input type="number" id="projectedArea" step="10" placeholder="4500" value="4500">
                </div>
            </div>

            <!-- Engine Parameters -->
            <div class="form-grid">
                <div class="form-group">
                    <label>Main Engine Output (kW)</label>
                    <input type="number" id="mainEngineOutput" step="100" placeholder="60000" value="60000">
                </div>
            </div>

            <!-- Stabilizers & Equipment -->
            <div class="form-grid">
                <div class="checkbox-group">
                    <input type="checkbox" id="rollStabilizer" checked>
                    <label for="rollStabilizer">Roll Stabilizer Fitted</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="finStabilizer" checked>
                    <label for="finStabilizer">Fin Stabilizer Active</label>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="button" class="btn btn-save" onclick="saveConfiguration()">💾 Save Configuration</button>
                <button type="button" class="btn btn-load" onclick="loadConfiguration()">📥 Load Saved</button>
            </div>

            <!-- Presets -->
            <div class="preset-section">
                <h3>Quick Presets</h3>
                <div class="preset-buttons">
                    <button type="button" class="preset-btn" onclick="loadPreset('explorer')">Explorer of Seas</button>
                    <button type="button" class="preset-btn" onclick="loadPreset('generic')">Generic Vessel</button>
                    <button type="button" class="preset-btn" onclick="loadPreset('supertanker')">Supertanker</button>
                    <button type="button" class="preset-btn" onclick="loadPreset('container')">Container Ship</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        const presets = {
            explorer: {
                vesselName: 'Explorer of the Seas',
                lbp: 274,
                beam: 38.6,
                draft: 8.9,
                cb: 0.6732,
                dwtTonnage: 182000,
                waterDepth: 17,
                mastHeight: 32.9,
                projectedArea: 4500,
                mainEngineOutput: 60000,
                rollStabilizer: true,
                finStabilizer: true
            },
            generic: {
                vesselName: 'Generic Vessel',
                lbp: 200,
                beam: 32,
                draft: 8,
                cb: 0.67,
                dwtTonnage: 150000,
                waterDepth: 17,
                mastHeight: 30,
                projectedArea: 3500,
                mainEngineOutput: 50000,
                rollStabilizer: true,
                finStabilizer: true
            },
            supertanker: {
                vesselName: 'Supertanker',
                lbp: 332,
                beam: 60,
                draft: 15,
                cb: 0.80,
                dwtTonnage: 320000,
                waterDepth: 20,
                mastHeight: 35,
                projectedArea: 6000,
                mainEngineOutput: 80000,
                rollStabilizer: false,
                finStabilizer: false
            },
            container: {
                vesselName: 'Container Ship',
                lbp: 400,
                beam: 59,
                draft: 14,
                cb: 0.72,
                dwtTonnage: 180000,
                waterDepth: 18,
                mastHeight: 45,
                projectedArea: 5500,
                mainEngineOutput: 70000,
                rollStabilizer: true,
                finStabilizer: true
            }
        };

        function saveConfiguration() {
            const config = {
                vesselName: document.getElementById('vesselName').value,
                lbp: parseFloat(document.getElementById('lbp').value),
                beam: parseFloat(document.getElementById('beam').value),
                draft: parseFloat(document.getElementById('draft').value),
                cb: parseFloat(document.getElementById('cb').value),
                dwtTonnage: parseFloat(document.getElementById('dwtTonnage').value),
                waterDepth: parseFloat(document.getElementById('waterDepth').value),
                mastHeight: parseFloat(document.getElementById('mastHeight').value),
                projectedArea: parseFloat(document.getElementById('projectedArea').value),
                mainEngineOutput: parseFloat(document.getElementById('mainEngineOutput').value),
                rollStabilizer: document.getElementById('rollStabilizer').checked,
                finStabilizer: document.getElementById('finStabilizer').checked
            };

            localStorage.setItem('vesselConfig', JSON.stringify(config));
            showStatus('✓ Configuration saved successfully', 'success');
        }

        function loadConfiguration() {
            const saved = localStorage.getItem('vesselConfig');
            if (saved) {
                const config = JSON.parse(saved);
                Object.keys(config).forEach(key => {
                    const element = document.getElementById(key);
                    if (element) {
                        if (element.type === 'checkbox') {
                            element.checked = config[key];
                        } else {
                            element.value = config[key];
                        }
                    }
                });
                showStatus('✓ Configuration loaded', 'success');
            } else {
                showStatus('✗ No saved configuration found', 'error');
            }
        }

        function loadPreset(presetName) {
            const preset = presets[presetName];
            if (preset) {
                Object.keys(preset).forEach(key => {
                    const element = document.getElementById(key);
                    if (element) {
                        if (element.type === 'checkbox') {
                            element.checked = preset[key];
                        } else {
                            element.value = preset[key];
                        }
                    }
                });
                showStatus(`✓ Loaded preset: ${preset.vesselName}`, 'success');
            }
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            setTimeout(() => {
                statusEl.className = 'status-message';
            }, 3000);
        }

        function goToPage(page) {
            window.location.href = page;
        }

        // Load configuration on page load
        window.addEventListener('load', () => {
            loadConfiguration();
        });
    </script>
</body>
</html>
